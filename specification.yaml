openapi: 3.0.1
info:
  title: EV Charging Public API
  version: 1.0.0
  description: Public API for electric vehicle charging stations.

servers:
  - url: https://localhost:8000

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: "Application is running"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /welcome:
    get:
      operationId: listWelcomePageData
      summary: Get list of all active charging stations for the welcome page (unauthenticated)
      description: Returns all public data about active charging stations.
      parameters:
        - name: city
          in: query
          description: City name
          required: false
          schema:
            type: string
            example: Tel Aviv
        - name: provider
          in: query
          description: Service provider (station owner) code
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination (defaults to 1 if omitted)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page (defaults to 200 if omitted)
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: List of active charging stations data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationBasicInfoCollectionResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /stations:
    get:
      operationId: listStations
      summary: Get list of charging stations
      description: Returns a list of charging stations data
      parameters:
        - name: city
          in: query
          description: City name
          required: false
          schema:
            type: string
        - name: provider
          in: query
          description: Service provider code
          required: false
          schema:
            type: string
            example: PRO_001
        - name: state
          in: query
          description: Station state filter
          required: false
          schema:
            type: string
            enum: [New, Active, OutOfService]
        - name: page
          in: query
          required: false
          description: Page number for pagination (defaults to 1 if omitted)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page (defaults to 200 if omitted)
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: List of charging stations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationCollectionResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /stations/{stationId}:
    get:
      operationId: getStationById
      summary: Get charging station by ID
      description: Returns a single charging station by its ID.
      parameters:
        - name: stationId
          in: path
          required: true
          description: Station identifier
          schema:
            type: string
      responses:
        '200':
          description: Charging station data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationSingleResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '404':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /sessions:
    post:
      operationId: createSession
      summary: Start a charging session
      description: Creates a new charging session for the given station, port, and user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '200':
          description: Session started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreatedResponse'
        '400':
          description: Wrong statuses of station or port
          $ref: '#/components/responses/ErrorResponse'
        '404':
          description: Wrong stationId or portId
          $ref: '#/components/responses/ErrorResponse'
        '409':
          description: Port is occupied
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /sessions/{sessionId}/stop:
    post:
      operationId: stopSession
      summary: Stop a charging session
      description: Stops an active charging session and returns the session summary.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Session identifier
          schema:
            type: string
      responses:
        '200':
          description: Session stopped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStoppedResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /sessions/current:
    get:
      operationId: getCurrentSession
      summary: Get current session
      responses:
        '200':
          description: Current charging session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSingleResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '404':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /sessions/history/{sessionId}:
    get:
      operationId: getSessionById
      summary: Get session history item by ID
      description: Returns a single user charging session from history by its ID.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Session history identifier
          schema:
            type: string
      responses:
        '200':
          description: Session history item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHistorySingleResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '404':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /sessions/history:
    get:
      operationId: listSessionHistory
      summary: Get user charging sessions history
      description: Returns user charging sessions during the specified period.
      parameters:
        - name: userId
          in: query
          required: true
          description: User identifier
          schema:
            type: string
        - name: dateFrom
          in: query
          required: false
          description: Start date for history period
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          required: false
          description: End date for history period (if omitted, defaults to current date/time)
          schema:
            type: string
            format: date
        - name: stationId
          in: query
          required: false
          description: Filter by station identifier
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination (defaults to 1 if omitted)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page (defaults to 200 if omitted)
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: User charging sessions history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHistoryCollectionResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /account/profile:
    get:
      operationId: getProfile
      summary: Get user profile
      description: Returns user profile by ID.
      parameters:
        - name: userId
          in: query
          required: true
          description: User identifier
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSingleResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '404':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /account/settings:
    get:
      operationId: getSettings
      summary: Get user settings
      description: Returns user account settings.
      parameters:
        - name: userId
          in: query
          required: true
          description: User identifier
          schema:
            type: string
      responses:
        '200':
          description: User settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsSingleResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '404':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /account/stats:
    get:
      operationId: getStats
      summary: Get user charging stats
      description: Returns user charging statistics.
      parameters:
        - name: userId
          in: query
          required: true
          description: User identifier
          schema:
            type: string
      responses:
        '200':
          description: User stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsSingleResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '404':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /support/stations:
    get:
      operationId: listSupportStations
      summary: Get list of support stations
      description: Returns support station information (without ports) filtered by city and provider.
      parameters:
        - name: city
          in: query
          required: false
          description: City name filter
          schema:
            type: string
        - name: providerCode
          in: query
          required: false
          description: Provider code filter
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination (defaults to 1 if omitted)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page (defaults to 200 if omitted)
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: List of support stations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationSupportListCollectionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /support/stations/{stationId}:
    get:
      operationId: getSupportStationById
      summary: Get support station by ID
      description: Returns detailed support information for a charging station including ports.
      parameters:
        - name: stationId
          in: path
          required: true
          description: Station identifier
          schema:
            type: string
      responses:
        '200':
          description: Support station details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationSupportDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /support/sessions:
    get:
      operationId: listSupportSessions
      summary: Get support sessions
      description: Returns support session details filtered by various criteria.
      parameters:
        - name: stationId
          in: query
          required: false
          description: Station identifier
          schema:
            type: string
        - name: portId
          in: query
          required: false
          description: Port identifier
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Session status filter
          schema:
            type: string
            enum: [preparing, charging, paused, completed, faulted, error]
        - name: startedAtFrom
          in: query
          required: false
          description: Start date filter (session started at or after)
          schema:
            type: string
            format: date-time
        - name: startedAtTo
          in: query
          required: false
          description: End date filter (session started at or before)
          schema:
            type: string
            format: date-time
        - name: endedAtFrom
          in: query
          required: false
          description: Start date filter (session ended at or after)
          schema:
            type: string
            format: date-time
        - name: endedAtTo
          in: query
          required: false
          description: End date filter (session ended at or before)
          schema:
            type: string
            format: date-time
        - name: userInitiated
          in: query
          required: false
          description: Filter by whether session was user-initiated
          schema:
            type: boolean
        - name: page
          in: query
          required: false
          description: Page number for pagination (defaults to 1 if omitted)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page (defaults to 200 if omitted)
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: List of support sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailedCollectionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /support/logs:
    get:
      operationId: listSupportLogs
      summary: Get support logs
      description: Returns support logs filtered by station, port, and date range.
      parameters:
        - name: stationId
          in: query
          required: false
          description: Station identifier
          schema:
            type: string
        - name: portId
          in: query
          required: false
          description: Port identifier
          schema:
            type: string
        - name: dateFrom
          in: query
          required: true
          description: Start date for log period
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: true
          description: End date for log period
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          description: Page number for pagination (defaults to 1 if omitted)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page (defaults to 200 if omitted)
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: List of support logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportLogCollectionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

components:

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    Meta:
      type: object
      required: [page, pageSize, totalItems, totalPages]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: INTERNAL_ERROR
            message:
              type: string
              example: Internal server error

    Station:
      type: object
      required: 
        - id
        - name
        - city
        - address
        - providerCode
        - providerName
        - maxPowerKw
        - portCount
        - state
      properties:
        id:
          type: string
        name:
          type: string
        city:
          type: string
        address:
          type: string
        providerCode:
          type: string
        providerName:
          type: string
        maxPowerKw:
          type: integer
        portCount:
          type: integer
        state:
          type: string
          enum: [New, Active, OutOfService]

    StationSingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Station'

    StationCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Station'
        meta:
          $ref: '#/components/schemas/Meta'

    StationBasicInfo:
      type: object
      required: [id, name, city, address, providerName, maxPowerKw, portCount]
      properties:
        id:
          type: string
        name:
          type: string
        city:
          type: string
        address:
          type: string
        providerName:
          type: string
        maxPowerKw:
          type: integer
        portCount:
          type: integer

    StationBasicInfoCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StationBasicInfo'
        meta:
          $ref: '#/components/schemas/Meta'

    StationSupportListItem:
      type: object
      required:
        - id
        - name
        - city
        - address
        - providerName
        - maxPowerKw
        - portCount
        - createdAt
        - updatedAt
        - managerName
        - managerPhone
        - notes
      properties:
        id:
          type: string
        name:
          type: string
        city:
          type: string
        address:
          type: string
        providerName:
          type: string
        maxPowerKw:
          type: integer
        portCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        managerName:
          type: string
        managerPhone:
          type: string
        notes:
          type: string

    PortSupportDetail:
      type: object
      required: [portId, portNumber, status, lastServiceDate, plannedServiceDate]
      properties:
        portId:
          type: string
        portNumber:
          type: integer
        status:
          type: string
        lastServiceDate:
          type: string
          format: date
        plannedServiceDate:
          type: string
          format: date

    StationSupportDetail:
      type: object
      required:
        - id
        - name
        - city
        - address
        - providerName
        - maxPowerKw
        - portCount
        - createdAt
        - updatedAt
        - managerName
        - managerPhone
        - notes
        - ports
      properties:
        id:
          type: string
        name:
          type: string
        city:
          type: string
        address:
          type: string
        providerName:
          type: string
        maxPowerKw:
          type: integer
        portCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        managerName:
          type: string
        managerPhone:
          type: string
        notes:
          type: string
        ports:
          type: array
          items:
            $ref: '#/components/schemas/PortSupportDetail'

    StationSupportDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/StationSupportDetail'

    StationSupportListCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StationSupportListItem'
        meta:
          $ref: '#/components/schemas/Meta'

    Session:
      type: object
      required:
        - id
        - stationId
        - status
        - startedAt
        - durationMinutes
        - chargeLevelPercent
        - energyConsumedKWh
        - maxPowerKw
        - pricePerKWh
        - currentCost
        - currency
        - estimatedMinutesRemaining
      properties:
        id:
          type: string
        stationId:
          type: string
        status:
          type: string
          enum: [preparing, charging, paused, completed, faulted, error]
        startedAt:
          type: string
          format: date-time
          example: '2026-03-04T09:00:00Z'
        endedAt:
          type: string
          format: date-time
          nullable: true
        durationMinutes:
          type: integer
        chargeLevelPercent:
          type: integer
        energyConsumedKWh:
          type: number
          format: float
          example: 18.4
        maxPowerKw:
          type: integer
        pricePerKWh:
          type: number
          format: float
          example: 1.50
        currentCost:
          type: number
          format: float
          example: 27.60
        currency:
          type: string
          example: ILS
        estimatedMinutesRemaining:
          type: integer
          example: 25

    SessionSingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Session'

    SessionDetailedItem:
      type: object
      required:
        - id
        - stationId
        - status
        - startedAt
        - durationMinutes
        - chargeLevelPercent
        - energyConsumedKWh
        - maxPowerKw
        - pricePerKWh
        - currentCost
        - currency
        - portId
        - userId
      properties:
        id:
          type: string
        stationId:
          type: string
        portId:
          type: string
        status:
          type: string
          enum: [preparing, charging, paused, completed, faulted, error]
        startedAt:
          type: string
          format: date-time
          example: '2026-03-04T09:00:00Z'
        endedAt:
          type: string
          format: date-time
          nullable: true
        durationMinutes:
          type: integer
        chargeLevelPercent:
          type: integer
        energyConsumedKWh:
          type: number
          format: float
        maxPowerKw:
          type: integer
        pricePerKWh:
          type: number
          format: float
        currentCost:
          type: number
          format: float
        currency:
          type: string
        userId:
          type: string
          description: User who initiated the session

    SessionDetailedCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SessionDetailedItem'
        meta:
          $ref: '#/components/schemas/Meta'

    StartSessionRequest:
      type: object
      required: [stationId, portId, userId]
      properties:
        stationId:
          type: string
        portId:
          type: string
        userId:
          type: string

    SessionCreated:
      type: object
      required: [id, status, startedAt, currency, pricePerKWh]
      properties:
        id:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        currency:
          type: string
        pricePerKWh:
          type: number
          format: float

    SessionCreatedResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SessionCreated'

    SessionStopped:
      type: object
      required: [id, status, endedAt, totalDurationMinutes, energyConsumedKWh, totalCost, currency]
      properties:
        id:
          type: string
        status:
          type: string
          example: completed
        endedAt:
          type: string
          format: date-time
        totalDurationMinutes:
          type: integer
        energyConsumedKWh:
          type: number
          format: float
        totalCost:
          type: number
          format: float
        currency:
          type: string

    SessionStoppedResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SessionStopped'

    SessionHistoryItem:
      type: object
      required:
        - id
        - stationId
        - startedAt
        - endedAt
        - totalDurationMinutes
        - energyConsumedKWh
        - pricePerKWh
        - totalCost
        - currency
      properties:
        id:
          type: string
        stationId:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        totalDurationMinutes:
          type: integer
        energyConsumedKWh:
          type: number
          format: float
        pricePerKWh:
          type: number
          format: float
        totalCost:
          type: number
          format: float
        currency:
          type: string

    SessionHistoryCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SessionHistoryItem'
        meta:
          $ref: '#/components/schemas/Meta'

    SessionHistorySingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SessionHistoryItem'

    Profile:
      type: object
      required: [userId, email, firstName, lastName, phone, role, createdAt, lastLoginAt]
      properties:
        userId:
          type: string
          example: usr-123
        email:
          type: string
          example: user@example.com
        firstName:
          type: string
          example: Dana
        lastName:
          type: string
          example: Levi
        phone:
          type: string
          example: "+972501234567"
        role:
          type: string
          enum: [USER, TECH_SUPPORT, ADMIN]
        createdAt:
          type: string
          format: date-time
          example: "2025-10-01T08:20:00Z"
        lastLoginAt:
          type: string
          format: date-time
