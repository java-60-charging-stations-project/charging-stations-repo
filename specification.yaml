        currency:
          type: string
          example: ILS
        notifications:
          type: string
          enum: [on, off]
        theme:
          type: string
          enum: [dark, light]

    SettingsSingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Settings'

    Stats:
      type: object
