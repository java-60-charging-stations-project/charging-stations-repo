        totalEnergyKWh:
          type: number
          format: float
        totalSpent:
          type: number
          format: float
        avgSpent:
          type: number
          format: float
        currency:
          type: string
          example: ILS
        favoriteStationId:
          type: string

    StatsSingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Stats'

    SupportLogItem:
