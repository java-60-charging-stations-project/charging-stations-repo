openapi: 3.0.1
info:
  title: EV Charging Public API
  version: 1.0.0
  description: Public API for electric vehicle charging stations.

servers:
  - url: https://localhost:8000

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /welcome:
    get:
      operationId: listWelcomePageData
      summary: Get list of all active charging stations for the welcome page (unauthenticated)
      description: Returns all public data about active charging stations.
      parameters:
        - name: city
          in: query
          description: City name
          required: false
          schema:
            type: string
            example: Tel Aviv
        - name: provider
          in: query
          description: Service provider (station owner) code
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of active charging stations data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationBasicInfoCollectionResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /stations:
    get:
      operationId: listStations
      summary: Get list of charging stations
      description: Returns a list of charging stations data
      parameters:
        - name: city
          in: query
          description: City name
          required: false
          schema:
            type: string
        - name: provider
          in: query
          description: Service provider code
          required: false
          schema:
            type: string
            example: PRO_001
        - name: state
          in: query
          description: Station state filter
          required: false
          schema:
            type: string
            enum: [New, Active, OutOfService]
      responses:
        '200':
          description: List of charging stations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationCollectionResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /stations/{stationId}:
    get:
      operationId: getStationById
      summary: Get charging station by ID
      description: Returns a single charging station by its ID.
      parameters:
        - name: stationId
          in: path
          required: true
          description: Station identifier
          schema:
            type: string
      responses:
        '200':
          description: Charging station data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationSingleResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '404':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /sessions/current:
    get:
      operationId: getCurrentSession
      summary: Get current session
      responses:
        '200':
          description: Current charging session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSingleResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '404':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /sessions/history/{sessionId}:
    get:
      operationId: getSessionById
      summary: Get session history item by ID
      description: Returns a single user charging session from history by its ID.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Session history identifier
          schema:
            type: string
      responses:
        '200':
          description: Session history item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHistorySingleResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '404':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

  /sessions/history:
    get:
      operationId: listSessionHistory
      summary: Get user charging sessions history
      description: Returns user charging sessions during the specified period.
      parameters:
        - name: userId
          in: query
          required: true
          description: User identifier
          schema:
            type: string
        - name: dateFrom
          in: query
          required: false
          description: Start date for history period
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          required: false
          description: End date for history period (if omitted, defaults to current date/time)
          schema:
            type: string
            format: date
        - name: stationId
          in: query
          required: false
          description: Filter by station identifier
          schema:
            type: string
      responses:
        '200':
          description: User charging sessions history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHistoryCollectionResponse'

        '400':
          $ref: '#/components/responses/ErrorResponse'

        '500':
          $ref: '#/components/responses/ErrorResponse'

components:

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    Meta:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: INTERNAL_ERROR
            message:
              type: string
              example: Internal server error

    Station:
      type: object
      required: [id, city, address, providerName, maxPowerKw, portCount, state]
      properties:
        id:
          type: string
        city:
          type: string
        address:
          type: string
        providerName:
          type: string
        maxPowerKw:
          type: integer
        portCount:
          type: integer
        state:
          type: string
          enum: [New, Active, OutOfService]
        tariff:
          type: string

    StationSingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Station'

    StationCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Station'
        meta:
          $ref: '#/components/schemas/Meta'

    StationBasicInfo:
      type: object
      required: [id, address, providerName, maxPowerKw, portCount]
      properties:
        id:
          type: string
        city:
          type: string
        address:
          type: string
        providerName:
          type: string
        maxPowerKw:
          type: integer
        portCount:
          type: integer

    StationBasicInfoCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StationBasicInfo'
        meta:
          $ref: '#/components/schemas/Meta'

    Session:
      type: object
      required:
        - id
        - stationId
        - status
        - startedAt
        - durationMinutes
        - chargeLevelPercent
        - energyConsumedKWh
        - maxPowerKw
        - pricePerKWh
        - currentCost
        - currency
        - estimatedMinutesRemaining
      properties:
        id:
          type: string
        stationId:
          type: string
        status:
          type: string
          enum: [preparing, charging, paused, completed, faulted, error]
        startedAt:
          type: string
          format: date-time
          example: '2026-03-04T09:00:00Z'
        endedAt:
          type: string
          format: date-time
          nullable: true
        durationMinutes:
          type: integer
        chargeLevelPercent:
          type: integer
        energyConsumedKWh:
          type: number
          format: float
          example: 18.4
        maxPowerKw:
          type: integer
        pricePerKWh:
          type: number
          format: float
          example: 1.50
        currentCost:
          type: number
          format: float
          example: 27.60
        currency:
          type: string
          example: ILS
        estimatedMinutesRemaining:
          type: integer
          example: 25

    SessionSingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Session'

    SessionHistoryItem:
      type: object
      required:
        - id
        - stationId
        - startedAt
        - endedAt
        - totalDurationMinutes
        - energyConsumedKWh
        - pricePerKWh
        - totalCost
        - currency
      properties:
        id:
          type: string
        stationId:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        totalDurationMinutes:
          type: integer
        energyConsumedKWh:
          type: number
          format: float
        pricePerKWh:
          type: number
          format: float
        totalCost:
          type: number
          format: float
        currency:
          type: string

    SessionHistoryCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SessionHistoryItem'
        meta:
          $ref: '#/components/schemas/Meta'

    SessionHistorySingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SessionHistoryItem'

  responses:

    ErrorResponse:
      description: Standard error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'