AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Charging stations backend on ECS Fargate behind ALB

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID
    Default: vpc-01eb545134560739e
  PublicSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets (use at least 2 in different AZs for ALB)
    Default: subnet-0d53d5fb3c0a49277, subnet-0ac3863b0b8448d3f
  CognitoUserPoolId:
    Type: String
    Description: Cognito user pool ID
    Default: il-central-1_rIAE4UIiQ
  CognitoClientId:
    Type: String
    Description: Cognito client ID
    Default: 2pbvbmldhk3o4iqnrff3vg7d1h
  CognitoRegion:
    Type: String
    Description: Region
    Default: il-central-1
  ImageUri:
    Type: String
    Description: ECR image URI
    Default: 852215679994.dkr.ecr.il-central-1.amazonaws.com/charging-stations-test-deploy:latest
  ContainerPort:
    Type: Number
    Default: 8000
  ContainerCpu:
    Type: Number
    Default: 256
    Description: CPU units for the Fargate task (e.g., 256 = 0.25 vCPU)
  ContainerMemory:
    Type: Number
    Default: 512
    Description: Memory for the Fargate task in MiB
  HealthCheckPath:
    Type: String
    Default: /health
    Description: Health check path for the application (HTTP 200 expected)
  LambdaRegion:
    Type: String
    Default: il-central-1
  LambdaAccountId:
    Type: String
    Default: 852215679994
  LambdaHealthName:
    Type: String
    Default: charging-stations-health
  DesiredCount:
    Type: Number
    Default: 1

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: charging-stations-cluster

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeHealthLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${LambdaRegion}:${LambdaAccountId}:function:${LambdaHealthName}'

  TaskLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/charging-stations-backend
      RetentionInDays: 14

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the public application load balancer
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: charging-stations-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets: !Ref PublicSubnets

  ApplicationTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: charging-stations-tg
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: 200

  ApplicationLoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ApplicationTargetGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: charging-stations-backend
          Image: !Ref ImageUri
          PortMappings:
            - ContainerPort: !Ref ContainerPort
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: !Ref ContainerPort
            - Name: API_PREFIX
              Value: /api/v1
            - Name: CORS_ORIGIN
              Value: '*'
            - Name: USE_LAMBDA
              Value: true
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: HEALTH_LAMBDA_FUNCTION_NAME
              Value: !Sub 'arn:aws:lambda:${LambdaRegion}:${LambdaAccountId}:function:${LambdaHealthName}'
            - Name: AUTH_DISABLED
              Value: false
            - Name: COGNITO_REGION
              Value: !Ref AWS::Region
            - Name: COGNITO_USER_POOL_ID
              Value: !Ref CognitoUserPoolId
            - Name: COGNITO_CLIENT_ID
              Value: !Ref CognitoClientId
            - Name: ENVIRONMENT
              Value: production
            - Name: LOG_LEVEL
              Value: info
            # add more env vars here to mirror your .env
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref TaskLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs


  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS service security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup

  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - ApplicationLoadBalancerListener
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref PublicSubnets
          SecurityGroups:
            - !Ref ServiceSecurityGroup
      LoadBalancers:
        - ContainerName: charging-stations-backend
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref ApplicationTargetGroup

Outputs:
  LoadBalancerArn:
    Description: ARN of the application load balancer
    Value: !Ref ApplicationLoadBalancer
  LoadBalancerDnsName:
    Description: DNS name of the application load balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  LoadBalancerSecurityGroupId:
    Description: Security group ID of the application load balancer
    Value: !Ref LoadBalancerSecurityGroup
  TargetGroupArn:
    Description: ARN of the application target group
    Value: !Ref ApplicationTargetGroup