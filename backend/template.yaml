AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Charging stations backend on ECS Fargate behind ALB

Parameters:
  TargetGroupArn:
    Type: String
    Description: Target group ARN
    Default: arn:aws:elasticloadbalancing:il-central-1:852215679994:targetgroup/targetGroup/8c32c278befea5b0
  AlbSecurityGroupId:
    Type: String
    Description: Security group ID of the existing ALB (for ECS service SG ingress)
    Default: sg-0cdedb1b9b3108ee4
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID
    Default: vpc-0d3987aee1c745343
  PublicSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets (use at least 2 in different AZs for ALB)
    Default: subnet-097b4a2befe615aad, subnet-05bdebc566310d684
  CognitoUserPoolId:
    Type: String
    Description: Cognito user pool ID
    Default: il-central-1_rIAE4UIiQ
  CognitoClientId:
    Type: String
    Description: Cognito client ID
    Default: 2pbvbmldhk3o4iqnrff3vg7d1h
  CognitoRegion:
    Type: String
    Description: Region
    Default: il-central-1
  ImageUri:
    Type: String
    Description: ECR image URI
    Default: 852215679994.dkr.ecr.il-central-1.amazonaws.com/charging-stations-test-deploy:latest
  ContainerPort:
    Type: Number
    Default: 8000
  DesiredCount:
    Type: Number
    Default: 1

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: charging-stations-cluster

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeHealthLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:charging-stations-health'

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: charging-stations-backend
          Image: !Ref ImageUri
          PortMappings:
            - ContainerPort: !Ref ContainerPort
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: !Ref ContainerPort
            - Name: API_PREFIX
              Value: /api/v1
            - Name: CORS_ORIGIN
              Value: '*'
            - Name: USE_LAMBDA
              Value: true
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: HEALTH_LAMBDA_FUNCTION_NAME
              Value: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:charging-stations-health'
            - Name: AUTH_DISABLED
              Value: false
            - Name: COGNITO_REGION
              Value: !Ref AWS::Region
            - Name: COGNITO_USER_POOL_ID
              Value: !Ref CognitoUserPoolId
            - Name: COGNITO_CLIENT_ID
              Value: !Ref CognitoClientId
            - Name: ENVIRONMENT
              Value: production
            - Name: LOG_LEVEL
              Value: info
            # add more env vars here to mirror your .env
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/charging-stations-backend
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs


  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS service security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroupId

  Service:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref PublicSubnets
          SecurityGroups:
            - !Ref ServiceSecurityGroup
      LoadBalancers:
        - ContainerName: charging-stations-backend
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroupArn